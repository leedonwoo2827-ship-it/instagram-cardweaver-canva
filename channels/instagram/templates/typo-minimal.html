<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CardWeaver — typo-minimal</title>
<style>
  @font-face {
    font-family: 'NotoSansKR';
    font-weight: 400;
    src: local('Noto Sans KR'), local('Noto Sans CJK KR'), local('Malgun Gothic');
  }
  @font-face {
    font-family: 'NotoSansKR';
    font-weight: 700;
    src: local('Noto Sans KR Bold'), local('Noto Sans CJK KR Bold'), local('Malgun Gothic Bold');
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 1080px; height: 1350px; overflow: hidden; }
  body {
    font-family: 'NotoSansKR', sans-serif;
    background: var(--primary, #3B2E22);
    color: var(--text, #F5EBD8);
    display: grid;
    grid-template-rows: 1fr 3fr 1fr;
    padding: 64px;
  }
  .top    { display: flex; justify-content: space-between; align-items: flex-start; }
  .middle { display: flex; flex-direction: column; justify-content: center; gap: 40px; }
  .bottom { display: flex; justify-content: space-between; align-items: flex-end; }

  .series-title { font-size: 28px; font-weight: 500; opacity: 0.85; letter-spacing: 0.02em; }
  .index-label  { font-size: 32px; font-weight: 500; opacity: 0.7; }

  .headline {
    font-size: 72px; font-weight: 700; line-height: 1.15;
    color: var(--accent, #E3A857);
    max-width: 80%;
    white-space: pre-wrap;
  }
  .body {
    font-size: 36px; font-weight: 400; line-height: 1.45;
    color: var(--text, #F5EBD8);
    max-width: 85%;
    white-space: pre-wrap;
  }

  .handle { font-size: 28px; font-weight: 500; opacity: 0.85; }
  .logo   { font-size: 28px; font-weight: 500; opacity: 0.85; }

  /* CTA card variant (role=cta) */
  body.cta .handle { font-size: 42px; font-weight: 700; opacity: 1; }
  body.cta .headline { font-size: 84px; }
</style>
</head>
<body id="card" style="--primary:#3B2E22; --accent:#E3A857; --text:#F5EBD8;">
  <div class="top">
    <div class="series-title" id="series-title">시리즈 제목</div>
    <div class="index-label" id="index-label">1/8</div>
  </div>
  <div class="middle">
    <div class="headline" id="headline">헤드라인이 들어갑니다</div>
    <div class="body" id="body">본문 내용이 들어갑니다. 2~4줄 이내 권장.</div>
  </div>
  <div class="bottom">
    <div class="handle" id="handle">@editor0712</div>
    <div class="logo" id="logo">CardWeaver</div>
  </div>

<script>
  // Data injection: render_html_preview 가 아래 data-card 를 실제 JSON 으로 치환해 주입한다.
  // 개발 시에는 기본값이 렌더됨. 프로덕션 렌더 시 __CARD_DATA__ 플레이스홀더가 교체된다.
  const CARD = /*__CARD_DATA__*/ {
    series_title: "시리즈 제목",
    index_label: "1/8",
    role: "body",
    headline: "헤드라인이 들어갑니다",
    body: "본문 내용이 들어갑니다.\n2~4줄 이내 권장.",
    handle: "@editor0712",
    logo: "CardWeaver",
    palette: { primary: "#3B2E22", accent: "#E3A857", text_on_primary: "#F5EBD8" }
  };

  const body = document.body;
  body.style.setProperty('--primary', CARD.palette.primary);
  body.style.setProperty('--accent',  CARD.palette.accent);
  body.style.setProperty('--text',    CARD.palette.text_on_primary);
  if (CARD.role === 'cta') body.classList.add('cta');

  document.getElementById('series-title').textContent = CARD.series_title || '';
  document.getElementById('index-label').textContent  = CARD.index_label  || '';
  document.getElementById('headline').textContent     = CARD.headline     || '';
  document.getElementById('body').textContent         = CARD.body         || '';
  document.getElementById('handle').textContent       = CARD.handle       || '';
  document.getElementById('logo').textContent         = CARD.logo         || '';
</script>
</body>
</html>
